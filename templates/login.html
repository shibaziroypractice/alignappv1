{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100 mt-10">
    <h1 class="text-2xl font-light text-center text-gray-900 mb-6">Welcome Back</h1>
    <form action="/login" method="POST" class="space-y-4">
        <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Email Address</label>
            <input type="email" name="email" required class="w-full border border-gray-200 p-3 rounded text-sm focus:outline-none focus:border-blue-500 bg-gray-50">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Password</label>
            <input type="password" name="password" required class="w-full border border-gray-200 p-3 rounded text-sm focus:outline-none focus:border-blue-500 bg-gray-50">
        </div>
        <div class="flex justify-between items-center mb-1">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
            <a href="/reset_password" class="text-xs text-blue-600 dark:text-blue-400 hover:underline font-medium transition-colors">Forgot password?</a>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded font-medium hover:bg-blue-700 transition mt-4">Login to Command Center</button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-6">Don't have an account? <a href="/register" class="text-gray-900 font-medium hover:underline">Register</a></p>
</div>
{% endblock %}
